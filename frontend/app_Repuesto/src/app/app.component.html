<ion-app>
  <ion-split-pane contentId="main-content" [when]="'lg'">
    <ion-menu contentId="main-content" type="overlay" *ngIf="authService.currentUser$ | async">
      <div class="sidebar-wrapper">
        <div class="sidebar-header">
          <div class="status-dot"></div>
          <div class="profile-container">
            <div class="avatar">
              <i class="fa-solid fa-user-tie"></i>
            </div>
            <div class="profile-info">
              <h2>{{ (authService.currentUser$ | async)?.usuario }}</h2>
              <span class="role">Administrator</span>
            </div>
          </div>
        </div>

        <ion-content class="menu-content" forceOverscroll="false">
          <div class="nav-section">
            <p class="section-label">Management</p>
            <div 
              *ngFor="let p of appPages" 
              class="nav-item"
              [class.active]="activeSubMenu === p"
              (click)="handlePageClick($event, p)">
              <div class="nav-icon">
                <ion-icon [name]="p.icon"></ion-icon>
              </div>
              <div class="nav-text">
                <span class="nav-title">{{ p.title }}</span>
                <span class="nav-desc">{{ p.description }}</span>
              </div>
              <div class="nav-arrow" *ngIf="p.subPages">
                <i class="fa-solid fa-chevron-right"></i>
              </div>
            </div>
          </div>
        </ion-content>

        <div class="sidebar-footer">
          <div class="logout-btn" (click)="logout()">
            <i class="fa-solid fa-power-off"></i>
            <span>Desconectarse</span>
          </div>
        </div>
      </div>
    </ion-menu>

    <!-- SUB-MENÚ FLOTANTE (BURBUJAS) -->
    <div 
      class="floating-menu" 
      *ngIf="activeSubMenu" 
      [style.top.px]="subMenuPos.top"
      [style.left.px]="subMenuPos.left"
      (click)="$event.stopPropagation()">
      <div class="floating-header">
        <ion-icon [name]="activeSubMenu.icon"></ion-icon>
        <span>{{ activeSubMenu.title }}</span>
      </div>
      <div class="floating-options">
        <button 
          *ngFor="let sub of activeSubMenu.subPages" 
          (click)="navigateTo(sub.url)"
          class="sub-option-btn">
          <ion-icon [name]="sub.icon"></ion-icon>
          <span class="sub-label">{{ sub.title }}</span>
        </button>
      </div>
    </div>

    <div class="ion-page" id="main-content">
      <ion-router-outlet></ion-router-outlet>
    </div>
  </ion-split-pane>
</ion-app>
