<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin | B&H Préstamos</title>
    <link rel="stylesheet" href="../src/css/input.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 font-['Inter',sans-serif] text-slate-900 overflow-x-hidden">
    <!-- Admin Sidebar / Header -->
    <div class="min-h-screen flex flex-col md:flex-row">
        <!-- Sidebar Navigation -->
        <aside class="w-full md:w-64 bg-slate-800 text-white flex flex-col shadow-2xl z-50 min-h-screen">
            <div class="p-6 border-b border-slate-700 flex justify-between items-center md:block">
                <h1 class="text-xl font-bold tracking-tighter text-brand">B&H <span class="text-white">ADMIN</span></h1>
                <button class="md:hidden text-slate-300" onclick="document.getElementById('mobileMenu').classList.toggle('hidden')">
                    <i class="fas fa-bars text-xl"></i>
                </button>
            </div>
            <nav id="mobileMenu" class="hidden md:flex flex-col flex-1 p-4 space-y-2">
                <a href="index.html" class="flex items-center gap-3 p-3 rounded-xl bg-brand text-white shadow-lg">
                    <i class="fas fa-chart-line"></i> <span>Dashboard (Visitas)</span>
                </a>
                <a href="banners.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-700 transition-all text-slate-300">
                    <i class="fas fa-ad"></i> <span>Banners</span>
                </a>
                <a href="carousel.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-700 transition-all text-slate-300">
                    <i class="fas fa-images"></i> <span>Carrusel</span>
                </a>
                <a href="promotions.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-700 transition-all text-slate-300">
                    <i class="fas fa-tag"></i> <span>Promociones</span>
                </a>
                <button id="logoutBtnMobile" class="md:hidden flex items-center gap-3 w-full p-3 text-red-400 hover:bg-red-500/10 rounded-xl transition-all">
                    <i class="fas fa-sign-out-alt"></i> <span>Cerrar Sesión</span>
                </button>
            </nav>
            <div class="hidden md:block p-4 border-t border-slate-700">
                <button id="logoutBtn" class="flex items-center gap-3 w-full p-3 text-red-400 hover:bg-red-500/10 rounded-xl transition-all">
                    <i class="fas fa-sign-out-alt"></i> <span>Cerrar Sesión</span>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto bg-slate-50 p-8">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4 max-w-3xl mx-auto w-full">
                <div>
                    <h2 class="text-3xl font-black text-prime uppercase tracking-tighter">Estadísticas de Visitas</h2>
                    <p class="text-slate-500 font-semibold italic">Monitor de actividad en tiempo real</p>
                </div>
            </header>

                    </div>
                </div>
                <!-- More cards... -->
            </div>

            <!-- Banners Section -->
            <section id="banners" class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-2xl border border-slate-100 mb-10 max-w-3xl mx-auto">
                <h3 class="text-xl font-black mb-6 flex items-center gap-3 italic">
                    <i class="fas fa-ad text-brand"></i> Configuración de Banner
                </h3>
                <form id="bannerForm" class="grid grid-cols-1 gap-6">
                    <div class="space-y-4">
                        <label class="block text-xs font-bold uppercase tracking-widest text-slate-500">Texto del Anuncio</label>
                        <input type="text" id="bannerText" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 focus:ring-2 focus:ring-brand outline-none" placeholder="Ej: ¡Aprobación en 24 horas!">
                    </div>
                    <div class="space-y-4">
                        <label class="block text-xs font-bold uppercase tracking-widest text-slate-500">Color de Fondo</label>
                        <input type="color" id="bannerColor" class="w-full h-14 bg-slate-50 border border-slate-200 rounded-2xl p-2 outline-none cursor-pointer">
                    </div>
                    <button type="submit" class="md:col-span-2 bg-prime text-white p-4 rounded-2xl font-black hover:bg-slate-800 transition-all shadow-lg active:scale-95">ACTUALIZAR ANUNCIO</button>
                </form>
            </section>

            <!-- Carousel Section -->
            <section id="carousel" class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-2xl border border-slate-100 mb-10 max-w-3xl mx-auto">
                <h3 class="text-xl font-black mb-6 flex items-center gap-3 italic">
                    <i class="fas fa-images text-brand"></i> Gestión de Carrusel
                </h3>
                <form id="carouselForm" class="space-y-6 mb-10">
                    <div class="flex flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-3xl p-10 hover:border-brand transition-all bg-slate-50 group">
                        <i class="fas fa-cloud-upload-alt text-4xl text-slate-300 group-hover:text-brand mb-4"></i>
                        <p class="text-sm text-slate-500 mb-4">Sube un archivo .jpg o .png (Máx 2MB)</p>
                        <input type="file" id="carouselInput" accept="image/*" class="hidden">
                        <button type="button" onclick="document.getElementById('carouselInput').click()" class="bg-white border border-slate-200 px-6 py-2 rounded-xl text-xs font-bold shadow-sm hover:shadow-md transition-all">SELECCIONAR IMAGEN</button>
                    </div>
                    <button type="submit" class="w-full bg-brand text-white p-4 rounded-2xl font-black hover:bg-brand/80 transition-all active:scale-95">AGREGAR AL CARRUSEL</button>
                </form>
                
                <h4 class="font-bold text-slate-500 text-xs uppercase tracking-[0.2em] mb-4">Imágenes Actuales</h4>
                <div id="carouselList" class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                    <!-- Las imágenes cargadas aparecerán aquí -->
                </div>
            </section>

            <!-- Promotions Section -->
            <section id="promotions" class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-2xl border border-slate-100 max-w-3xl mx-auto">
                <h3 class="text-xl font-black mb-6 flex items-center gap-3 italic">
                    <i class="fas fa-tags text-brand"></i> Promociones Especiales
                </h3>
                <form id="promoForm" class="grid grid-cols-1 gap-6 mb-10">
                    <div class="space-y-4">
                        <label class="block text-xs font-bold uppercase tracking-widest text-slate-500">Título de la Promoción</label>
                        <input type="text" id="promoTitle" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 focus:ring-2 focus:ring-brand outline-none" placeholder="Ej: Bono Navideño">
                    </div>
                    <div class="space-y-4">
                        <label class="block text-xs font-bold uppercase tracking-widest text-slate-500">Descripción</label>
                        <input type="text" id="promoDesc" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 focus:ring-2 focus:ring-brand outline-none" placeholder="Ej: Obtén un 10% de descuento...">
                    </div>
                    <button type="submit" class="md:col-span-2 bg-accent text-prime p-4 rounded-2xl font-black hover:bg-yellow-600 transition-all shadow-lg active:scale-95">AÑADIR PROMOCIÓN</button>
                </form>
                <div id="promoList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Lista de promociones -->
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="../src/js/admin.js"></script>
</body>
</html>
