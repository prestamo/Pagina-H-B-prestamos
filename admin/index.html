<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin | B&H Préstamos</title>
    <link rel="icon" href="../assets/img/logob&H.jpeg">
    <link rel="stylesheet" href="../src/css/input.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 font-['Inter',sans-serif] text-slate-900 overflow-x-hidden">
    <!-- Admin Sidebar / Header -->
    <div class="min-h-screen flex flex-col md:flex-row">
        <!-- Sidebar Navigation -->
        <aside class="w-full md:w-64 bg-slate-800 text-white flex flex-col shadow-2xl z-50 min-h-screen">
            <div class="p-6 border-b border-slate-700 flex justify-between items-center md:block">
                <h1 class="text-xl font-bold tracking-tighter text-brand flex items-center gap-2">
                    <img src="../assets/img/logob%26H.jpeg" alt="Logo" class="w-8 h-8 rounded-lg shadow-sm object-cover">
                    <span>B&H <span class="text-white">ADMIN</span></span>
                </h1>
                <button class="md:hidden text-slate-300" onclick="document.getElementById('mobileMenu').classList.toggle('hidden')">
                    <i class="fas fa-bars text-xl"></i>
                </button>
            </div>
            <nav id="mobileMenu" class="hidden md:flex flex-col flex-1 p-4 space-y-2">
                <a href="/admin/index.html" class="flex items-center gap-3 p-3 rounded-xl bg-brand text-white shadow-lg">
                    <i class="fas fa-chart-line"></i> <span>Dashboard</span>
                </a>
                <a href="/admin/banners.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-700 transition-all text-slate-300">
                    <i class="fas fa-ad"></i> <span>Banners</span>
                </a>
                <a href="/admin/carousel.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-700 transition-all text-slate-300">
                    <i class="fas fa-images"></i> <span>Carrusel</span>
                </a>
                <a href="/admin/promotions.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-700 transition-all text-slate-300">
                    <i class="fas fa-tag"></i> <span>Promociones</span>
                </a>
                <a href="/admin/cuotas.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-700 transition-all text-slate-300">
                    <i class="fas fa-table-list"></i> <span>Cuotas/Transparencia</span>
                </a>
                <a href="/admin/footer.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-700 transition-all text-slate-300">
                    <i class="fas fa-shoe-prints rotate-90"></i> <span>Redes y Footer</span>
                </a>
                <div class="h-px bg-slate-700 my-2"></div>
                <a href="/admin/solicitudes_list.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-700 transition-all text-slate-300">
                    <i class="fas fa-list-check"></i> <span>Ver Solicitudes</span>
                </a>
                <a href="/admin/solicitudes.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-700 transition-all text-slate-300">
                    <i class="fas fa-file-circle-plus"></i> <span>Nueva Solicitud</span>
                </a>
                <a href="/admin/clientes.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-700 transition-all text-slate-300">
                    <i class="fas fa-users"></i> <span>Clientes</span>
                </a>
            </nav>
            <div class="hidden md:block p-4 border-t border-slate-700">
                <button id="logoutBtn" class="flex items-center gap-3 w-full p-3 text-red-400 hover:bg-red-500/10 rounded-xl transition-all">
                    <i class="fas fa-sign-out-alt"></i> <span>Cerrar Sesión</span>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto bg-slate-50 p-8">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4 max-w-6xl mx-auto w-full">
                <div>
                    <h2 class="text-3xl font-black text-prime uppercase tracking-tighter">Panel de Analíticas</h2>
                    <p class="text-slate-500 font-semibold italic">Monitor de tráfico y visitantes únicos</p>
                </div>
                <div class="flex gap-2">
                    <input type="date" id="statsDateStart" class="bg-white border border-slate-200 rounded-xl px-4 py-2 text-sm font-bold shadow-sm outline-none focus:ring-2 focus:ring-brand">
                    <input type="date" id="statsDateEnd" class="bg-white border border-slate-200 rounded-xl px-4 py-2 text-sm font-bold shadow-sm outline-none focus:ring-2 focus:ring-brand">
                </div>
            </header>

            <!-- Stats Overview Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 max-w-6xl mx-auto">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 flex flex-col justify-between group hover:border-brand transition-all">
                    <span class="text-slate-400 text-xs font-black uppercase tracking-widest mb-4 block">Hoy</span>
                    <div class="flex items-end justify-between">
                        <h3 id="statToday" class="text-5xl font-black text-prime">---</h3>
                        <i class="fas fa-users text-2xl text-slate-100 group-hover:text-brand transition-colors"></i>
                    </div>
                </div>
                <div class="bg-prime p-8 rounded-[2.5rem] shadow-xl flex flex-col justify-between text-white relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10">
                        <i class="fas fa-chart-line text-8xl"></i>
                    </div>
                    <span class="text-white/50 text-xs font-black uppercase tracking-widest mb-4 block">Esta Semana</span>
                    <div class="flex items-end justify-between">
                        <h3 id="statWeek" class="text-5xl font-black">---</h3>
                    </div>
                </div>
                <div class="bg-brand p-8 rounded-[2.5rem] shadow-xl flex flex-col justify-between text-white">
                    <span class="text-white/50 text-xs font-black uppercase tracking-widest mb-4 block">Total Histórico</span>
                    <div class="flex items-end justify-between">
                        <h3 id="statTotal" class="text-5xl font-black">---</h3>
                    </div>
                </div>
            </div>

            <!-- Main Charts Row -->
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-10 max-w-6xl mx-auto">
                <!-- Large Traffic Chart -->
                <div class="lg:col-span-3 bg-white p-6 md:p-8 rounded-[2.5rem] shadow-xl border border-slate-100 h-[400px] flex flex-col">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-black italic uppercase tracking-tighter">Tendencia de Tráfico</h3>
                        <select id="chartType" class="bg-slate-50 border-none text-[10px] font-black uppercase tracking-widest p-2 rounded-lg outline-none cursor-pointer hover:bg-slate-100 transition-colors">
                            <option value="daily">Vista Diaria</option>
                            <option value="weekly">Vista Semanal</option>
                            <option value="monthly">Vista Mensual</option>
                        </select>
                    </div>
                    <div class="flex-1 min-h-0">
                        <canvas id="trafficChart"></canvas>
                    </div>
                </div>
                
                <!-- Page Distribution (More compact) -->
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 h-[400px] flex flex-col">
                    <h3 class="text-lg font-black mb-6 italic uppercase tracking-tighter">Top Páginas</h3>
                    <div id="pagesList" class="space-y-3 overflow-y-auto flex-1 pr-2 custom-scrollbar">
                        <!-- Items injected via JS -->
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Chart.js and Admin Logic -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="../src/js/admin.js"></script>
</body>
</html>
