<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrativo | B&H Préstamos</title>
    <link rel="stylesheet" href="../src/css/input.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-950 font-['Inter',sans-serif] text-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Logo -->
        <div class="text-center mb-10 overflow-hidden">
            <img src="../assets/img/logob&H.jpeg" alt="Logo B&H" class="h-24 w-auto mx-auto rounded-full border-4 border-brand shadow-[0_0_50px_rgba(0,174,239,0.3)] animate-pulse">
            <h1 class="mt-6 text-3xl font-black tracking-tighter italic uppercase text-white">Panel de <span class="text-brand">Control</span></h1>
            <p class="text-slate-400 text-sm mt-2">Gestión de B&H Préstamos en General</p>
        </div>

        <!-- Login Card -->
        <div class="bg-slate-900/50 backdrop-blur-xl border border-white/10 p-8 rounded-[2.5rem] shadow-2xl relative group">
            <div class="absolute -inset-0.5 bg-gradient-to-r from-brand to-accent rounded-[2.5rem] blur opacity-20 group-hover:opacity-40 transition duration-1000"></div>
            
            <form id="loginForm" class="relative space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Correo Electrónico</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                        <input type="email" id="email" required class="w-full bg-slate-800/50 border border-white/10 rounded-2xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-brand focus:border-transparent outline-none transition-all placeholder:text-slate-600" placeholder="admin@bh-prestamos.com">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Contraseña</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                        <input type="password" id="password" required class="w-full bg-slate-800/50 border border-white/10 rounded-2xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-brand focus:border-transparent outline-none transition-all placeholder:text-slate-600" placeholder="••••••••">
                    </div>
                </div>

                <div id="errorMessage" class="hidden text-red-400 text-xs font-bold text-center bg-red-400/10 py-3 rounded-xl border border-red-400/20">
                    <i class="fas fa-exclamation-circle mr-2"></i> Credenciales incorrectas
                </div>

                <button type="submit" id="loginBtn" class="w-full bg-brand text-white font-black py-4 rounded-2xl hover:bg-cyan-600 transition-all shadow-lg shadow-brand/20 active:scale-95 flex items-center justify-center gap-3">
                    <span>ACCEDER</span>
                    <i class="fas fa-arrow-right text-xs"></i>
                </button>
            </form>
        </div>

        <p class="text-center mt-10 text-slate-500 text-xs uppercase tracking-[0.3em]">
            &copy; 2026 Segurity Access
        </p>
    </div>

    <script type="module" src="../src/js/admin.js"></script>
</body>
</html>
